<ui:composition 
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="primefaces">
  <h:head></h:head>		
  <div style="margin-top: 25px;">

    <h:panelGroup rendered="#{not empty formDataBean.registers}">
      <div style="text-align:right;">
        <span style="font-weight: bold;">
          Total Valor: 50,00
        </span>
        <span style="margin-right: 60px;"></span>
      </div>
      <p:dataTable  selection="#{formDataBean.selectedRegister}" 
                    selectionMode="single"
                    allowUnsorting="true" 
                    sortMode="single"
                    rowKey="#{register.id}"
                    value="#{formDataBean.registers}"
                    var="register">
        <p:ajax listener="#{formDataBean.onRowSelect}"
                event="rowSelect" />
        <p:columns  headerText="#{column}"
                    value="#{formDataBean.columns}" 
                    var="column"
                    sortBy="#{register.values[colIndex].value}"
                    columnIndexVar="colIndex">
            <h:outputText 
                value="#{register.values[colIndex].value}"/>
        </p:columns>
      </p:dataTable>
    </h:panelGroup>
	
  </div>
</ui:composition>
