<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="primefaces">
<h:head>
    <ui:include src="../header.xhtml" />
</h:head>
<body>
<f:loadBundle basename="messages" var="msg" />
<h:form>
    <ui:include src="../menu.xhtml" />

    <div class="container">
        <input type="hidden" name="appId" id="appId"/>
        <h:commandButton
            action="#{formDataBean.onClickBtGetForms}"
            style="display: none;"
            id="triggerBt"/>

        <script>
            function onClickLink(appId) {
                jQuery('#appId').val(appId)
                jQuery("[id*='triggerBt']").click()
            }
        </script>
        <div class="row gx-4 gx-lg-5">
            <div>
                <h4>Lista de #{msg['label.aplicacoes']}</h4>
            </div>
            <div style="margin-top: 25px;"></div>
            <p:dataList value="#{cadAppBean.apps}" var="app">
                <a  href="#"
                    style="margin-left: 7px; font-weight:bold;"
                    onclick="onClickLink('#{app.appId}'); return false;">
                    <p:button
                        styleClass="rounded-button ui-button-success ui-button-outlined"
                        style="margin-bottom: 5px;"
                        icon="pi pi-sitemap"/>
                </a>                        
                <a href="#"
                    style="margin-left: 7px; font-weight:bold;"
                    onclick="onClickLink('#{app.appId}'); return false;">
                    #{app.name}
                </a>
            </p:dataList>
        </div>
    </div>
</h:form>
</body>
</html>
