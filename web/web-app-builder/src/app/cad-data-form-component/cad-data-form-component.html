<header-component></header-component>

<div class="container" style="margin-left: 15%;">
  <h4>{{form.label}}</h4>
  <div style="margin-bottom: 20px;"></div>
  <form>
    @for(field of fields; track field.id) {
      <div class="mb-3">
        <label for="f{{fields[$index].id}}" class="form-label">
            {{fields[$index].label}}
        </label>
        <div>
            <input
              type="text"
              [(ngModel)]="fields[$index].value"
              style="width: 450px;"
              name="f{{fields[$index].id}}"
              id="f{{fields[$index].id}}"
              pInputText/>
        </div>
      </div>
    }
    <div class="flexDiv">
      <div class="childDiv">
          <p-button
            (onClick)="onClickBtSalvar()"
            [severity]="btSeverity"
            label="Salvar"/>
      </div>
      <div class="childDiv">
          <p-button
            (onClick)="onClickBtPesquisar()"
            [severity]="btSeverity"
            label="Pesquisar"/>
      </div>
      <div class="childDiv">
          <p-button
            (onClick)="onClickBtLimpar()"
            [severity]="btSeverity"
            label="Limpar"/>
      </div>
    </div>
    <div style="margin-top: 25px;">
        <p-table
          [value]="formRegisters"
          [tableStyle]="{ 'min-width': '50rem' }">
          <ng-template #header>
            <tr>
              @for(field of fields; track field.id) {
                <th>{{field.label}}</th>
              }
            </tr>
          </ng-template>
          <ng-template #body let-register>
            <tr>
              @for(fieldValue of register.values; track fieldValue.id) {
                <td>{{fieldValue.val}}</td>
              }
            </tr>
          </ng-template>
        </p-table>
    </div>

  </form>
</div>
<p-dialog header="Dados do Formulário"
          [(visible)]="dlgFormDataVisible"
          [style]="{ width: '25rem' }"
          [modal]="true">
    <div>
        <span class="p-text-secondary block mb-8">
            Dados salvos com sucesso!
        </span>
    </div>
    <div style="text-align:right; margin-top: 15px;">
        <p-button
          (click)="dlgFormDataVisible = false"
          label="OK" />
    </div>
</p-dialog>
