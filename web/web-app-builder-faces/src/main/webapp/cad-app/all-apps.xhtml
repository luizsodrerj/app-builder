<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="primefaces">
<h:head>
    <ui:include src="../header.xhtml" />
</h:head>
<body>
<f:loadBundle basename="messages" var="msg" />
<h:form>
    <ui:include src="../menu.xhtml" />

    <div class="container">
        <div class="row gx-4 gx-lg-5">
            <div>
                <h4>Escolha a #{msg['label.aplicacao']} que voce quer configurar</h4>
            </div>
            <div style="margin-top: 25px;"></div>    

            <input type="hidden" name="appId" id="appId"/>
            <h:commandButton
                action="#{cadAppBean.onClickBtConfigApp}"
                style="display: none;"
                id="triggerBt"/>

            <script>
                function onclickLinkConf(appId) {
                    jQuery('#appId').val(appId)
                    jQuery("[id*='triggerBt']").click()
                }
            </script>
            <p:dataList 
                style="width: 80%;"
                value="#{cadAppBean.apps}" 
                var="app">
                <div class="flex-div" style="margin-bottom:10px; font-weight: bold;">
                    <div style="width: 28%;">
                        <a  href="#" 
                            onclick="onclickLinkConf('#{app.appId}'); return false;"
                            style="margin-left:7px;">
                            <p:button
                                styleClass="rounded-button ui-button-success ui-button-outlined"
                                style="margin-bottom: 5px;"
                                icon="pi pi-cog"/>
                        </a>        
                        <a  href="#" 
                            onclick="onclickLinkConf('#{app.appId}'); return false;"
                            style="margin-left:7px;">
                            #{app.name}
                        </a>
                    </div>
                    <div style="margin-top:10px; margin-right:5px; width:90px;">
                        #{app.descStatus}
                    </div>
                    <div>
                        <p:button
                            styleClass="ui-button-raised ui-button-success ui-button-flat"
                            action="#{cadAppBean.onClickBtEnableApp}"
                            style="font-weight: bold;"
                            disabled="#{app.enabled}"
                            value="Habilitar"
                            ajax="false">
                            <f:param 
                                value="#{app.appId}"
                                name="appId"/>
                        </p:button>    
                        <span style="margin-right: 8px;"></span>
                        <p:button
                            styleClass="ui-button-raised ui-button-danger ui-button-flat"
                            action="#{cadAppBean.onClickBtDisableApp}"
                            style="font-weight: bold;"
                            disabled="#{app.disabled}"
                            value="Desabilitar"
                            ajax="false">
                            <f:param 
                                value="#{app.appId}"
                                name="appId"/>
                        </p:button>    
                    </div>
                </div>
            </p:dataList>
        </div>
    </div>
</h:form>
</body>
</html>
