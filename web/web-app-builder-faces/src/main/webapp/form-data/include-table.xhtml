<ui:composition 
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="primefaces">
  <h:head></h:head>		
  <div style="margin-top: 25px;">

    <h:panelGroup rendered="#{not empty formDataBean.registers}">

      <ui:include src="include-total.xhtml"/>
      <p:dataTable  selection="#{formDataBean.selectedRegister}" 
                    selectionMode="single"
                    allowUnsorting="true" 
                    sortMode="single"
                    rowKey="#{register.id}"
                    value="#{formDataBean.registers}"
                    var="register">
        <p:ajax listener="#{formDataBean.onRowSelect}"
                event="rowSelect" />
        <p:columns  headerText="#{column}"
                    sortBy="#{register.values[colIndex].value}"
                    columnIndexVar="colIndex"
                    value="#{formDataBean.columns}" 
                    var="column">
            <h:outputText 
                value="#{register.values[colIndex].value}"/>
        </p:columns>
      </p:dataTable>
      <ui:include src="include-total.xhtml"/>
      
      <div style="margin-bottom: 25px;"></div>

    </h:panelGroup>
	
  </div>
</ui:composition>
