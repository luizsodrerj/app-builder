<header-component></header-component>

<div class="container">
  <form>
    <div class="mb-3">
      <label for="nome" class="form-label">
          Nome da Aplicação
      </label>
      <div>
          <input
            type="text"
            [(ngModel)]="app.nome"
            style="width: 400px;"
            pInputText
            name="nome"
            id="nome"/>
      </div>
    </div>
    <div class="row">
        <div class="col-2" style="width: 14%;">
            <p-button label="Criar Aplicação"
                      [severity]="btSeverity" />
        </div>
        <div class="col-3">
            <a [routerLink]="['/cad-form', app.id, app.nome]">
              <p-button label="Criar um Formulário de Cadastro"
                        [disabled]="disableBtCadForm"
                        [severity]="btSeverity" />
            </a>
        </div>
    </div>

  </form>
</div>
