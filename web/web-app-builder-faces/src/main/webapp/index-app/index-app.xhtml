<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="primefaces">
<h:head>
    <ui:include src="../header.xhtml" />
</h:head>
<body>
<h:form>
    <ui:include src="../menu.xhtml" />

    <style>
        .ui-datalist-data {
            display: flex !important;
            gap: 20px !important;
            list-style-type: none;
            padding: 0;
        }
    </style>
    <div class="container">
        <div style="margin-top: 85px;"></div>
        <div class="row gx-4 gx-lg-5">
          <p:dataList
             value="#{indexAppBean.appAttributes}"
             var="appAttribute">
            <div class="col-md-4 mb-5" style="width: 100%;">
                <div class="card h-100">
                    <div class="card-body">
                        <h3 class="card-title">#{appAttribute.title}</h3>
                        <p class="card-text">
                            #{appAttribute.text}
                        </p>
                    </div>
                    <div class="card-footer">
                        <h:panelGroup rendered="#{appAttribute.hasParameter}">
                            <!---->
                            <a  href="#{appAttribute.link}?#{appAttribute.paramName}=#{appAttribute.param}">
                                <p:button
                                    value="#{appAttribute.btLabel}"
                                    styleClass="ui-button-secondary"
                                    icon="#{appAttribute.icon}"/>
                            </a>
                        </h:panelGroup>
                        <h:panelGroup rendered="#{not appAttribute.hasParameter}">
                            <a href="#{appAttribute.link}">
                                <p:button
                                    value="#{appAttribute.btLabel}"
                                    styleClass="ui-button-secondary"
                                    icon="#{appAttribute.icon}"/>
                            </a>
                        </h:panelGroup>
                    </div>
                </div>
            </div>
          </p:dataList>
        </div>
    </div>

</h:form>
</body>
</html>
