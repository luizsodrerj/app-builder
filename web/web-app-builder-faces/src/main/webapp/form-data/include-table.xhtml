<ui:composition 
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="primefaces">
  <h:head></h:head>		
  <div style="margin-top: 25px;">
	
  <!--<:panelGroup rendered="{not empty formDataBean.registers}">-->
    <h:panelGroup rendered="#{not empty formDataBean.registers}">
      <p:dataTable  value="#{formDataBean.registers}"
                    var="register" >
        <p:columns  headerText="#{column}"
                    value="#{formDataBean.columns}" 
                    var="column"
                    columnIndexVar="colIndex"
                    filterDisabled="true"
                    filterable="false" 
                    sortBy="null">
            <h:outputText 
                value="#{register.values[colIndex].value}"/>
        </p:columns>
      </p:dataTable>
    </h:panelGroup>
	
	
  </div>
</ui:composition>
