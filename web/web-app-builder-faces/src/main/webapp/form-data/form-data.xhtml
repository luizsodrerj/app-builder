<ui:composition template="../commonLayout.xhtml"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="primefaces">
<ui:define name="content">
  <h:head></h:head>		
  <div class="container" style="margin-left: 15%;">
    <p:button style="display: none;" />

    <script src="#{request.contextPath}/form-data/form-data.js?id=#{request.session.id}"></script>

    <h4>#{formDataBean.form.label}</h4>
    <div style="margin-bottom: 20px;"></div>

    <ui:repeat var="field" value="#{formDataBean.fields}">
      <div class="mb-3">
        <label for="f#{field.id}" class="form-label">
            #{field.label}
        </label>
        <div>
            <h:panelGroup 
              rendered="#{field.typeOfMonetaryData}">
              <input 
                type="text"  
                value="#{field.value}"
                name="f#{field.id}"
                id="f#{field.id}"
                class="money"/>
              <span style="margin-left:10px; display:inline-block; gap:5px;">
                <input name="total-field-#{field.id}"
                      id="total-field-#{field.id}" 
                      class="form-check-input"
                      type="checkbox"
                      value="true"/>
                <span style="margin-left:3px;">
                  Totalizar este campo ao Pesquisar
                </span>
              </span>  
            </h:panelGroup>
            <h:panelGroup rendered="#{not field.typeOfMonetaryData}">
              <input 
                type="text"  
                value="#{field.value}"
                style="width: 450px;"
                name="f#{field.id}"
                id="f#{field.id}"/>
            </h:panelGroup>
        </div>
      </div>
    </ui:repeat>

    <ui:include src="include-button-bar.xhtml" />

    <ui:include src="include-table.xhtml" />

  </div>

  <ui:include src="include-dialogs.xhtml" />

  <ui:include src="include-export-data.xhtml" />

</ui:define>
</ui:composition>
