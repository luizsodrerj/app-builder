<header-component></header-component>

<div class="container">
  <form>
    <div class="row">
      <div class="col-5" style="width: 36%;">
        <div class="mb-3">
          <label for="nome" class="form-label">
              Nome do Formulário
          </label>
          <div>
              <input
                type="text"
                [(ngModel)]="form.nome"
                style="width: 350px;"
                pInputText
                name="nome"
                id="nome"/>
          </div>
        </div>
        <div class="row">
            <div class="col-2">
                <p-button
                  (onClick)="onClickBtSalvar()"
                  label="Salvar"
                  [severity]="btSeverity" />
            </div>
            <div class="col-9" style="text-align: center;">
                <p-button
                  label="Adicionar um Campo no Formulário"
                  (onClick)="addField()"
                  [hidden]="btAddHidden"
                  [severity]="btSeverity" />
                <p-button
                  label="Alterar Dados do Campo"
                  [hidden]="btUpdateHidden"
                  (onClick)="updateField()"
                  [severity]="'success'" />
                <p-button
                  label="Cancelar"
                  [hidden]="btUpdateHidden"
                  [style]="{'margin-left': '20px'}"
                  (onClick)="cancelUpdateField()"
                  [severity]="'warn'" />
            </div>
        </div>
      </div> <!-- col-5 -->
      <div class="col-6">
          <field-child-form-component
              (onChangeChildType)="onChangeType($event)"
              [(labelValue)]="childLabelValue"/>
      </div>
    </div> <!-- row -->
    <div style="font-weight: bold; margin-bottom: 9px;">
        <span>Preview do Campo</span>
    </div>
    <div class="mb-3">
      <label for="f" class="form-label">
          {{ childLabelValue() }}
      </label>
      <div>
          <input
            type="text"
            style="width: 280px;"
            [hidden]="prevTypeHidden"
            pInputText
            id="f"/>
      </div>
    </div>

    <cad-form-child-component
        (childEvent)="onChildRowSelect($event)"/>

    <cadform-dialogs-child-component
        (onClickOk)="onClickChildBtOk($event)"/>

  </form>
</div>
