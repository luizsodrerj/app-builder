
<div>
    <p-table
        [value]="fields"
        [tableStyle]="{ 'min-width': '50rem' }"
        (onRowSelect)="onRowSelect($event)"
        [(selection)]="selectedField"
        selectionMode="single">
        <ng-template #header>
            <tr>
                <th>Nome</th>
                <th>Label</th>
                <th>Tipo de Campo</th>
                <th>Tipo de Dado</th>
            </tr>
        </ng-template>
        <ng-template #body let-field>
            <tr [pSelectableRow]="field">
                <td>{{ field.name }}</td>
                <td>{{ field.label }}</td>
                <td>{{ field.type }}</td>
                <td>{{ field.dataType }}</td>
            </tr>
        </ng-template>
    </p-table>
</div>
