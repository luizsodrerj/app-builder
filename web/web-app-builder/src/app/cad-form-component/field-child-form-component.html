
  <div class="mb-3">
    <label for="nome" class="form-label">
        Nome do Campo
    </label>
    <div>
        <input
          type="text"
          [(ngModel)]="field.name"
          style="width: 250px;"
          name="fieldName"
          id="fieldName"
          pInputText/>
    </div>
  </div>
  <div class="mb-3">
    <label for="fieldLabel" class="form-label">
        Label do Campo
    </label>
    <div>
        <input
          type="text"
          [(ngModel)]="field.label"
          (keyup)="onKeyUpLabel($event)"
          style="width: 250px;"
          name="fieldLabel"
          id="fieldLabel"
          pInputText/>
    </div>
  </div>
  <div class="mb-3">
    <label for="fieldType" class="form-label">
        Tipo do Campo
    </label>
    <div>
        <select (change)="onChangeType(type.value)"
                [(ngModel)]="typeSelectedValue")
                #type
                name="type"
                id="type">
            <option [value]="0">Selecione uma Opção</option>
            @for(item of types; track item.id) {
                <option [value]="item.id">
                    {{item.typeName}}
                </option>
            }
        </select>
    </div>
  </div>
